<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Lernen — A1</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#ebebea;--txt:#1a1a1a;--txt2:#666;--txt3:#999;--bor:rgba(0,0,0,0.12);--bor2:rgba(0,0,0,0.22);--green:#1D9E75;--gl:#E1F5EE;--gd:#085041;--bl:#E6F1FB;--bd:#0C447C;--rl:#FAECE7;--rd:#7A2010;--yl:#FEF3CD;--yd:#7A5200;--r:10px;--rs:6px;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--txt:#f0f0f0;--txt2:#aaa;--txt3:#666;--bor:rgba(255,255,255,0.1);--bor2:rgba(255,255,255,0.2);--gl:#0F3D2C;--gd:#5DCAA5;--bl:#0C2340;--bd:#85B7EB;--rl:#3D150A;--rd:#F09575;--yl:#3D2F00;--yd:#F0C050;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
.app{max-width:600px;margin:0 auto;padding-bottom:60px;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-card{width:100%;max-width:400px;background:var(--bg);border:0.5px solid var(--bor2);border-radius:var(--r);padding:32px 28px;}
.auth-logo{font-size:28px;text-align:center;margin-bottom:6px;}
.auth-title{font-size:20px;font-weight:600;text-align:center;margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:24px;}
.auth-tabs{display:flex;border:0.5px solid var(--bor);border-radius:var(--rs);overflow:hidden;margin-bottom:20px;}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;cursor:pointer;background:var(--bg2);color:var(--txt2);}
.auth-tab.active{background:var(--green);color:#fff;font-weight:500;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--txt2);margin-bottom:5px;}
.field input,.field select{width:100%;padding:10px 12px;border:0.5px solid var(--bor2);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--txt);outline:none;}
.field input:focus,.field select:focus{border-color:var(--green);}
.auth-btn{width:100%;padding:12px;border-radius:var(--rs);border:none;background:var(--green);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
.auth-btn:disabled{opacity:0.6;cursor:default;}
.auth-err{font-size:12px;color:#D85A30;text-align:center;margin-top:10px;min-height:18px;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:0.5px solid var(--bor);position:sticky;top:0;background:var(--bg);z-index:10;}
.nav-logo{font-size:15px;font-weight:600;}
.nav-right{display:flex;align-items:center;gap:8px;}
.streak{display:flex;align-items:center;gap:3px;font-size:13px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--yl);color:var(--yd);}
.streak.cold{background:var(--bg2);color:var(--txt2);}
.due-pill{font-size:12px;padding:3px 9px;border-radius:20px;background:var(--bl);color:var(--bd);font-weight:500;}
.user-btn{font-size:12px;padding:3px 9px;border-radius:20px;border:0.5px solid var(--bor);background:var(--bg2);color:var(--txt2);cursor:pointer;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;}
.sync-dot.syncing{background:#F0A020;animation:pulse 1s infinite;}
.sync-dot.err{background:#D85A30;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.tabs{display:flex;padding:0 16px;border-bottom:0.5px solid var(--bor);background:var(--bg);position:sticky;top:45px;z-index:9;overflow-x:auto;}
.tab{flex:1;min-width:48px;padding:9px 4px;text-align:center;font-size:12px;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500;}
.content{padding:14px 16px;}
.stats-row{display:flex;gap:8px;margin-bottom:12px;}
.stat{flex:1;background:var(--bg2);border-radius:var(--rs);padding:9px;text-align:center;}
.stat-n{font-size:18px;font-weight:600;}
.stat-l{font-size:11px;color:var(--txt2);margin-top:1px;}
.prog-bar{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.4s;}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.cat-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--bor);background:var(--bg);color:var(--txt2);font-size:12px;cursor:pointer;}
.cat-btn.active{border-color:var(--green);background:var(--gl);color:var(--gd);font-weight:500;}
.mode-row{display:flex;gap:6px;margin-bottom:12px;}
.mode-btn{flex:1;padding:7px 4px;border-radius:var(--rs);border:0.5px solid var(--bor);background:var(--bg);color:var(--txt2);font-size:12px;cursor:pointer;text-align:center;}
.mode-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.card{background:var(--bg);border:0.5px solid var(--bor2);border-radius:var(--r);padding:18px;margin-bottom:10px;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cat-tag{font-size:11px;padding:2px 10px;border-radius:20px;background:var(--bg2);color:var(--txt2);}
.speak-btn{display:flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--bor);background:none;color:var(--txt2);cursor:pointer;}
.speak-btn.speaking{border-color:var(--green);color:var(--green);background:var(--gl);}
.art-s{font-size:13px;color:var(--txt3);font-style:italic;margin-bottom:2px;text-align:center;}
.de-word{font-size:30px;font-weight:600;color:var(--txt);text-align:center;}
.en-word{font-size:15px;color:var(--green);font-weight:500;text-align:center;margin-bottom:8px;}
.divider{height:0.5px;background:var(--bor);margin:10px 0;}
.phrase-block{margin-bottom:7px;padding:9px 11px;background:var(--bg2);border-radius:var(--rs);}
.phrase-row{display:flex;align-items:flex-start;gap:6px;justify-content:space-between;}
.phrase-de{font-size:13px;font-weight:500;color:var(--txt);flex:1;line-height:1.5;}
.phrase-de .hw{color:var(--green);}
.phrase-en{font-size:12px;color:var(--txt2);margin-top:3px;}
.psb{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:14px;padding:2px;flex-shrink:0;}
.psb:hover{color:var(--green);}
.hint-txt{text-align:center;font-size:12px;color:var(--txt3);margin-top:10px;cursor:pointer;padding:6px;border-radius:var(--rs);}
.hint-txt:hover{background:var(--bg2);}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn{flex:1;padding:11px;border-radius:var(--rs);border:0.5px solid var(--bor);font-size:13px;cursor:pointer;font-weight:500;background:var(--bg2);color:var(--txt2);}
.btn-g{background:var(--gl);color:var(--gd);border-color:var(--green);}
.btn-next{width:100%;margin-top:10px;padding:11px;border-radius:var(--rs);border:none;background:var(--green);color:#fff;font-size:14px;font-weight:500;cursor:pointer;}
.sm2-note{font-size:11px;text-align:center;color:var(--txt3);margin-top:6px;}
.sm2-note b{color:var(--green);}
.info-box{background:var(--bg2);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:var(--txt2);line-height:1.6;margin-bottom:12px;}
.info-box b{color:var(--txt);font-weight:500;}
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.q-opt{padding:12px 8px;border-radius:var(--rs);border:0.5px solid var(--bor);background:var(--bg);color:var(--txt);font-size:13px;cursor:pointer;text-align:center;line-height:1.4;}
.q-opt:hover:not(:disabled){border-color:var(--green);background:var(--gl);color:var(--gd);}
.q-opt.correct{background:var(--gl);border-color:var(--green);color:var(--gd);}
.q-opt.wrong{background:var(--rl);border-color:#D85A30;color:var(--rd);}
.q-opt:disabled{cursor:default;}
.blank-phrase{font-size:18px;font-weight:500;color:var(--txt);text-align:center;line-height:1.8;}
.blank{display:inline-block;background:var(--bg2);border-bottom:2px solid var(--green);min-width:80px;height:22px;vertical-align:middle;border-radius:2px;}
.gender-card{background:var(--bg);border:0.5px solid var(--bor2);border-radius:var(--r);padding:24px 18px;text-align:center;margin-bottom:10px;}
.gender-word{font-size:36px;font-weight:600;margin-bottom:6px;}
.gender-hint{font-size:13px;color:var(--txt2);margin-bottom:20px;}
.gender-btns{display:flex;gap:10px;justify-content:center;margin-bottom:12px;}
.g-btn{flex:1;max-width:120px;padding:14px 8px;border-radius:var(--rs);border:0.5px solid var(--bor2);background:var(--bg2);color:var(--txt);font-size:18px;font-weight:600;cursor:pointer;}
.g-btn:hover:not(:disabled){border-color:var(--green);}
.g-btn.correct{background:var(--gl);border-color:var(--green);color:var(--gd);}
.g-btn.wrong{background:var(--rl);border-color:#D85A30;color:var(--rd);}
.g-btn:disabled{cursor:default;}
.gender-result{font-size:15px;font-weight:500;margin-top:8px;}
.gender-result.ok{color:var(--green);}
.gender-result.no{color:#D85A30;}
.gender-score{display:flex;gap:8px;margin-bottom:12px;}
.gscore{flex:1;background:var(--bg2);border-radius:var(--rs);padding:8px;text-align:center;}
.gscore-n{font-size:20px;font-weight:600;}
.gscore-l{font-size:11px;color:var(--txt2);}
.list-sec{margin-bottom:20px;}
.list-cat-hdr{font-size:14px;font-weight:600;padding:8px 0 6px;border-bottom:0.5px solid var(--bor);margin-bottom:8px;display:flex;justify-content:space-between;}
.list-word{margin-bottom:6px;border:0.5px solid var(--bor);border-radius:var(--rs);overflow:hidden;}
.list-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;background:var(--bg);}
.list-hdr:hover{background:var(--bg2);}
.lw-left{display:flex;align-items:center;gap:6px;min-width:0;}
.lw-art{font-size:11px;color:var(--txt3);font-style:italic;}
.lw-de{font-size:14px;font-weight:500;}
.lw-en{font-size:12px;color:var(--txt2);}
.lw-known{font-size:11px;color:var(--gd);background:var(--gl);border-radius:20px;padding:2px 8px;flex-shrink:0;}
.list-body{padding:10px 12px;background:var(--bg2);display:none;}
.list-body.open{display:block;}
.lp-de{font-size:13px;font-weight:500;}
.lp-de .hw{color:var(--green);}
.lp-en{font-size:12px;color:var(--txt2);margin-top:2px;}
.mark-btn{font-size:12px;padding:4px 12px;border-radius:20px;cursor:pointer;border:0.5px solid var(--bor);background:var(--bg);color:var(--txt2);margin-top:8px;}
.mark-btn.known{background:var(--gl);color:var(--gd);border-color:var(--green);}
.end-card{text-align:center;padding:40px 20px;}
.end-emoji{font-size:40px;margin-bottom:10px;}
.end-title{font-size:20px;font-weight:600;margin-bottom:8px;}
.end-sub{font-size:14px;color:var(--txt2);margin-bottom:20px;}
.dash-wrap{padding:16px;}
.dash-title{font-size:18px;font-weight:600;margin-bottom:4px;}
.dash-sub{font-size:13px;color:var(--txt2);margin-bottom:16px;}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.dash-stat{background:var(--bg2);border-radius:var(--rs);padding:12px;text-align:center;}
.dash-n{font-size:22px;font-weight:600;}
.dash-l{font-size:11px;color:var(--txt2);}
.student-card{border:0.5px solid var(--bor);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;background:var(--bg);}
.student-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px;}
.student-name{font-size:15px;font-weight:500;}
.student-email{font-size:12px;color:var(--txt2);}
.sbadges{display:flex;gap:5px;flex-wrap:wrap;}
.sb{font-size:11px;padding:2px 9px;border-radius:20px;}
.sb-g{background:var(--gl);color:var(--gd);}
.sb-b{background:var(--bl);color:var(--bd);}
.sb-y{background:var(--yl);color:var(--yd);}
.sb-r{background:var(--rl);color:var(--rd);}
.s-prog{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:8px;}
.s-prog-fill{height:100%;background:var(--green);border-radius:3px;}
.s-prog-lbl{font-size:11px;color:var(--txt2);margin-top:4px;}
.refresh-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid var(--bor);background:var(--bg2);color:var(--txt2);cursor:pointer;margin-bottom:14px;}
.plan-stats{display:flex;gap:8px;margin-bottom:12px;}
.day-card{border:0.5px solid var(--bor);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.day-card.today{border-color:var(--green);border-width:1.5px;}
.day-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:var(--bg);}
.day-hdr:hover{background:var(--bg2);}
.day-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;background:var(--bg2);color:var(--txt2);}
.day-num.t{background:var(--green);color:#fff;}
.day-num.d{background:var(--gl);color:var(--gd);}
.day-num.r{background:var(--bl);color:var(--bd);}
.day-meta{flex:1;min-width:0;}
.day-title{font-size:14px;font-weight:500;}
.day-sub{font-size:12px;color:var(--txt2);margin-top:1px;}
.day-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;}
.badge-g{background:var(--gl);color:var(--gd);}
.badge-b{background:var(--bl);color:var(--bd);}
.day-body{padding:12px 14px;background:var(--bg2);border-top:0.5px solid var(--bor);display:none;}
.day-body.open{display:block;}
.sec-lbl{font-size:11px;font-weight:500;color:var(--txt3);letter-spacing:0.05em;margin:10px 0 5px;}
.sec-lbl:first-child{margin-top:0;}
.phase-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.ph-min{font-size:12px;font-weight:500;color:var(--green);width:26px;flex-shrink:0;padding-top:2px;}
.ph-mode{font-size:11px;font-weight:500;color:var(--txt);background:var(--bg);border:0.5px solid var(--bor);border-radius:20px;padding:1px 8px;flex-shrink:0;white-space:nowrap;}
.ph-desc{font-size:12px;color:var(--txt2);flex:1;line-height:1.5;}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.chip{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);border:0.5px solid var(--bor);color:var(--txt2);}
.chip.r{border-color:var(--green);color:var(--gd);background:var(--gl);}
.sci-box{background:var(--bg);border:0.5px solid var(--bor);border-radius:var(--rs);padding:8px 10px;margin-top:4px;font-size:12px;color:var(--txt2);line-height:1.55;}
.mnem-item{font-size:12px;color:var(--txt2);padding:4px 0;border-bottom:0.5px solid var(--bor);line-height:1.4;}
.mnem-item:last-child{border:none;}
.done-btn{width:100%;margin-top:10px;padding:9px;border-radius:var(--rs);border:0.5px solid var(--green);background:var(--green);color:#fff;font-size:13px;font-weight:500;cursor:pointer;}
.undone-btn{width:100%;margin-top:10px;padding:9px;border-radius:var(--rs);border:0.5px solid var(--bor);background:var(--bg);color:var(--txt2);font-size:13px;cursor:pointer;}
</style>
</head>
<body>

<div id="auth-screen" class="auth-wrap" style="display:none">
  <div class="auth-card">
    <div class="auth-logo">🇩🇪</div>
    <div class="auth-title">Deutsch Lernen</div>
    <div class="auth-sub">Sign in to save your progress across all devices</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchAuth('login')">Sign in</div>
      <div class="auth-tab" id="tab-signup" onclick="switchAuth('signup')">Sign up</div>
    </div>
    <div id="login-form">
      <div class="field"><label>Email</label><input type="email" id="li-email" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="li-pass" placeholder="••••••••"></div>
      <button class="auth-btn" id="li-btn" onclick="doLogin()">Sign in</button>
    </div>
    <div id="signup-form" style="display:none">
      <div class="field"><label>Your name (shown to teacher)</label><input type="text" id="su-name" placeholder="e.g. Ana"></div>
      <div class="field"><label>Email</label><input type="email" id="su-email" placeholder="you@example.com"></div>
      <div class="field"><label>Password (min 6 chars)</label><input type="password" id="su-pass" placeholder="••••••••"></div>
      <div class="field"><label>I am a...</label><select id="su-role"><option value="student">Student</option><option value="teacher">Teacher</option></select></div>
      <button class="auth-btn" id="su-btn" onclick="doSignup()">Create account</button>
    </div>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<div id="main-app" class="app" style="display:none">
  <div class="nav">
    <div class="nav-logo">🇩🇪 Deutsch Lernen</div>
    <div class="nav-right">
      <span class="sync-dot" id="sync-dot" title="Sync status"></span>
      <div class="streak cold" id="streak-el">❄️ 0</div>
      <div class="due-pill" id="due-pill">— due</div>
      <button class="user-btn" id="user-btn" onclick="doSignout()">Sign out</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('flash')">Flash</div>
    <div class="tab" onclick="setTab('quiz')">Quiz</div>
    <div class="tab" onclick="setTab('fill')">Fill-in</div>
    <div class="tab" onclick="setTab('gender')">Gender</div>
    <div class="tab" onclick="setTab('browse')">Browse</div>
    <div class="tab" onclick="setTab('plan')">Plan</div>
  </div>
  <div class="content" id="content"><div style="text-align:center;padding:60px;color:var(--txt2)">Loading your progress...</div></div>
</div>

<div id="teacher-app" class="app" style="display:none">
  <div class="nav">
    <div class="nav-logo">🇩🇪 Teacher Dashboard</div>
    <div class="nav-right"><button class="user-btn" onclick="doSignout()">Sign out</button></div>
  </div>
  <div id="teacher-content"><div style="text-align:center;padding:60px;color:var(--txt2)">Loading class data...</div></div>
</div>

<script>
const SURL='https://yngsuxuamhzefkkjsgus.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InluZ3N1eHVhbWh6ZWZra2pzZ3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTg1MDcsImV4cCI6MjA5NDU5NDUwN30.XMBgluFUd6Hs8Zf0l8eEVXDsgzsSXqnWduUulmhaavk';
const sb=supabase.createClient(SURL,SKEY);
let CU=null,CP=null,syncT=null,pending={};
let sm2Cache={},known=new Set(),streakN=0,lastStudy=null,doneDays=new Set();
let tab='flash',flashMode='de',selCats=new Set(),queue=[],qIdx=0,revealed=false;
let quizSt=null,blankSt=null,gQ=[],gIdx=0,gAns=false,gScore={ok:0,tot:0};

// ── DATA ─────────────────────────────────────────────

// ── SM-2 ─────────────────────────────────────────────
function s2g(de){return sm2Cache[de]||{interval:0,reps:0,ef:2.5,next:null};}
function s2r(de,q){
  let c=s2g(de);
  if(q>=3){if(c.reps===0)c.interval=1;else if(c.reps===1)c.interval=6;else c.interval=Math.round(c.interval*c.ef);c.reps++;}
  else{c.reps=0;c.interval=1;}
  c.ef=Math.max(1.3,c.ef+0.1-(5-q)*(0.08+(5-q)*0.02));
  let nx=new Date();nx.setDate(nx.getDate()+c.interval);
  c.next=nx.toISOString().split('T')[0];
  sm2Cache[de]=c;schedSync(de,c);return c;
}
function s2due(de){let c=s2g(de);if(!c.next)return true;return c.next<=tday();}
function tday(){return new Date().toISOString().split('T')[0];}

// ── SYNC ─────────────────────────────────────────────
function setDot(s){let d=document.getElementById('sync-dot');if(d)d.className='sync-dot'+(s==='syncing'?' syncing':s==='err'?' err':'');}
function schedSync(de,sm){pending[de]={...sm,known:known.has(de)};clearTimeout(syncT);syncT=setTimeout(flush,2000);}
async function flush(){
  if(!CU||!Object.keys(pending).length)return;
  setDot('syncing');
  let rows=Object.entries(pending).map(([de,d])=>({user_id:CU.id,word_de:de,known:d.known,interval:d.interval,reps:d.reps,ef:d.ef,next_review:d.next,updated_at:new Date().toISOString()}));
  pending={};
  let{error}=await sb.from('word_progress').upsert(rows,{onConflict:'user_id,word_de'});
  setDot(error?'err':'');
}
async function loadProg(){
  if(!CU)return;setDot('syncing');
  let{data:wp}=await sb.from('word_progress').select('*').eq('user_id',CU.id);
  if(wp)wp.forEach(r=>{sm2Cache[r.word_de]={interval:r.interval,reps:r.reps,ef:parseFloat(r.ef),next:r.next_review};if(r.known)known.add(r.word_de);});
  let{data:sk}=await sb.from('streaks').select('*').eq('user_id',CU.id).single();
  if(sk){streakN=sk.streak_count;lastStudy=sk.last_study_date;}
  setDot('');updStreak();updDue();buildQ();setTab('flash');
}
async function markStudied(){
  let today=tday();if(lastStudy===today)return;
  let yest=new Date();yest.setDate(yest.getDate()-1);
  streakN=lastStudy===yest.toISOString().split('T')[0]?streakN+1:1;
  lastStudy=today;updStreak();
  await sb.from('streaks').upsert({user_id:CU.id,streak_count:streakN,last_study_date:today,updated_at:new Date().toISOString()});
}

// ── AUTH ─────────────────────────────────────────────
function switchAuth(t){
  ['login','signup'].forEach(x=>{document.getElementById(x+'-form').style.display=x===t?'block':'none';document.getElementById('tab-'+x).className='auth-tab'+(x===t?' active':'');});
  document.getElementById('auth-err').textContent='';
}
async function doLogin(){
  let e=document.getElementById('li-email').value.trim(),p=document.getElementById('li-pass').value;
  if(!e||!p){document.getElementById('auth-err').textContent='Please fill in all fields.';return;}
  let btn=document.getElementById('li-btn');btn.disabled=true;btn.textContent='Signing in...';
  let{error}=await sb.auth.signInWithPassword({email:e,password:p});
  btn.disabled=false;btn.textContent='Sign in';
  if(error)document.getElementById('auth-err').textContent=error.message;
}
async function doSignup(){
  let name=document.getElementById('su-name').value.trim(),e=document.getElementById('su-email').value.trim(),p=document.getElementById('su-pass').value,role=document.getElementById('su-role').value;
  if(!name||!e||!p){document.getElementById('auth-err').textContent='Please fill in all fields.';return;}
  if(p.length<6){document.getElementById('auth-err').textContent='Password must be at least 6 characters.';return;}
  let btn=document.getElementById('su-btn');btn.disabled=true;btn.textContent='Creating account...';
  let{data,error}=await sb.auth.signUp({email:e,password:p});
  if(error){btn.disabled=false;btn.textContent='Create account';document.getElementById('auth-err').textContent=error.message;return;}
  if(data.user)await sb.from('profiles').upsert({id:data.user.id,email:e,display_name:name,role});
  btn.disabled=false;btn.textContent='Create account';
  document.getElementById('auth-err').textContent='Account created! Check your email to confirm, then sign in.';
}
async function doSignout(){
  await sb.auth.signOut();
  known=new Set();sm2Cache={};streakN=0;lastStudy=null;CU=null;CP=null;
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
  document.getElementById('teacher-app').style.display='none';
}

sb.auth.onAuthStateChange(async(ev,session)=>{
  try{
    if(session?.user){
      CU=session.user;
      if(selCats.size===0)selCats=new Set(Object.keys(DATA));
      let{data:p}=await sb.from('profiles').select('*').eq('id',CU.id).single();
      CP=p;
      if(p?.role==='teacher'){
        document.getElementById('auth-screen').style.display='none';
        document.getElementById('main-app').style.display='none';
        document.getElementById('teacher-app').style.display='block';
        loadTeacher();
      }else{
        document.getElementById('auth-screen').style.display='none';
        document.getElementById('main-app').style.display='block';
        document.getElementById('teacher-app').style.display='none';
        let ub=document.getElementById('user-btn');
        if(ub)ub.textContent=CP?.display_name||CU.email;
        loadProg();
      }
    }else{
      document.getElementById('auth-screen').style.display='flex';
      document.getElementById('main-app').style.display='none';
      document.getElementById('teacher-app').style.display='none';
    }
  }catch(err){
    console.error('Auth state error:',err);
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('main-app').style.display='none';
    document.getElementById('teacher-app').style.display='none';
  }
});

// ── TEACHER DASHBOARD ────────────────────────────────
async function loadTeacher(){
  let tc=document.getElementById('teacher-content');
  let{data:profiles}=await sb.from('profiles').select('*').eq('role','student');
  let{data:allWP}=await sb.from('word_progress').select('*');
  let{data:allSK}=await sb.from('streaks').select('*');
  if(!profiles?.length){tc.innerHTML='<div class="dash-wrap"><div class="dash-title">Class Dashboard</div><p style="color:var(--txt2);font-size:14px;margin-top:20px">No students yet. Share this link:<br><br><strong>https://v-a-r-t-i.github.io/deutschapp</strong></p></div>';return;}
  let totalW=Object.values(DATA).reduce((a,b)=>a+b.length,0);
  let today=tday(),yest=new Date();yest.setDate(yest.getDate()-1);let yStr=yest.toISOString().split('T')[0];
  let activeToday=allSK?.filter(s=>s.last_study_date===today).length||0;
  let totalKnown=allWP?.filter(p=>p.known).length||0;
  let avgKnown=profiles.length?Math.round(totalKnown/profiles.length):0;
  let html=`<div class="dash-wrap"><div class="dash-title">Class Dashboard</div><div class="dash-sub">${profiles.length} student${profiles.length>1?'s':''} · ${totalW} words total</div><button class="refresh-btn" onclick="loadTeacher()">↺ Refresh</button><div class="dash-stats"><div class="dash-stat"><div class="dash-n">${profiles.length}</div><div class="dash-l">students</div></div><div class="dash-stat"><div class="dash-n">${activeToday}</div><div class="dash-l">active today</div></div><div class="dash-stat"><div class="dash-n">${avgKnown}</div><div class="dash-l">avg known</div></div></div>`;
  profiles.sort((a,b)=>{let ka=allWP?.filter(p=>p.user_id===a.id&&p.known).length||0,kb=allWP?.filter(p=>p.user_id===b.id&&p.known).length||0;return kb-ka;});
  for(let p of profiles){
    let wp=allWP?.filter(x=>x.user_id===p.id)||[];
    let sk=allSK?.find(s=>s.user_id===p.id);
    let kn=wp.filter(x=>x.known).length,due=wp.filter(x=>x.next_review&&x.next_review<=today).length;
    let sn=sk?.streak_count||0,ld=sk?.last_study_date;
    let active=ld===today||ld===yStr;
    let ldStr=ld?(ld===today?'today':ld===yStr?'yesterday':ld):'never';
    let pct=Math.round(kn/totalW*100);
    html+=`<div class="student-card"><div class="student-top"><div><div class="student-name">${p.display_name||'Unnamed'}</div><div class="student-email">${p.email}</div></div><div class="sbadges"><span class="sb sb-g">${kn}/${totalW}</span>${due?`<span class="sb sb-b">${due} due</span>`:''}<span class="sb ${active?'sb-y':'sb-r'}">${active?'🔥':'❄️'} ${sn}d</span></div></div><div class="s-prog"><div class="s-prog-fill" style="width:${pct}%"></div></div><div class="s-prog-lbl">${pct}% complete · last seen ${ldStr}</div></div>`;
  }
  html+='</div>';tc.innerHTML=html;
}

// ── HELPERS ───────────────────────────────────────────
function speak(t,btn){if(!window.speechSynthesis)return;speechSynthesis.cancel();if(btn&&btn.classList.contains('speaking')){btn.classList.remove('speaking');return;}document.querySelectorAll('.speaking').forEach(b=>b.classList.remove('speaking'));let u=new SpeechSynthesisUtterance(t);u.lang='de-DE';u.rate=0.88;let v=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('de'));if(v.length)u.voice=v[0];if(btn){btn.classList.add('speaking');u.onend=()=>btn.classList.remove('speaking');}speechSynthesis.speak(u);}
function bw(s,w){return s.replace(new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?:en|es|er|em|s|n)?)','gi'),'<span class="hw">$1</span>');}
function aw(){let w=[];for(let c of selCats)for(let i of(DATA[c]||[]))w.push({...i,cat:c});return w;}
function cp(cat){let ws=DATA[cat]||[];return{k:ws.filter(w=>known.has(w.de)).length,t:ws.length};}
function shuf(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function ring(k,t){let r=7,c=2*Math.PI*r,p=t?k/t:0,da=(p*c).toFixed(1),ga=((1-p)*c).toFixed(1),col=p===1?'#1D9E75':p>0?'#5DCAA5':'rgba(128,128,128,0.2)';return`<svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="${r}" fill="none" stroke="rgba(128,128,128,0.15)" stroke-width="2"/><circle cx="8" cy="8" r="${r}" fill="none" stroke="${col}" stroke-width="2" stroke-dasharray="${da} ${ga}" stroke-linecap="round" transform="rotate(-90 8 8)"/></svg>`;}
function updStreak(){let el=document.getElementById('streak-el');if(!el)return;let today=tday(),yest=new Date();yest.setDate(yest.getDate()-1);let act=lastStudy===today||lastStudy===yest.toISOString().split('T')[0];el.textContent=(act?'🔥':'❄️')+' '+streakN;el.className='streak'+(act?'':' cold');}
function updDue(){let el=document.getElementById('due-pill');if(!el)return;el.textContent=aw().filter(w=>s2due(w.de)).length+' due';}
function statsH(){let all=aw(),t=all.length,k=all.filter(x=>known.has(x.de)).length,d=all.filter(w=>s2due(w.de)).length;return`<div class="stats-row"><div class="stat"><div class="stat-n">${t}</div><div class="stat-l">words</div></div><div class="stat"><div class="stat-n" style="color:var(--green)">${k}</div><div class="stat-l">known</div></div><div class="stat"><div class="stat-n" style="color:var(--bd)">${d}</div><div class="stat-l">due today</div></div></div><div class="prog-bar"><div class="prog-fill" style="width:${t?Math.round(k/t*100):0}%"></div></div>`;}
function catH(){return'<div class="cat-grid">'+Object.keys(DATA).map(cat=>{let p=cp(cat);return`<button class="cat-btn${selCats.has(cat)?' active':''}" onclick="togCat('${cat}')">${ring(p.k,p.t)}${cat}</button>`;}).join('')+'</div>';}
function togCat(cat){if(selCats.has(cat)){if(selCats.size>1)selCats.delete(cat);}else selCats.add(cat);setTab(tab);}
function phFull(item){return item.phrases.map(p=>`<div class="phrase-block"><div class="phrase-row"><div><div class="phrase-de">${bw(p[0],item.de)}</div><div class="phrase-en">${p[1]}</div></div><button class="psb" onclick="speak('${p[0].replace(/'/g,"\\'")}',this)">🔊</button></div></div>`).join('');}
function phDE(item){return item.phrases.map(p=>`<div class="phrase-block"><div class="phrase-row"><div class="phrase-de">${bw(p[0],item.de)}</div><button class="psb" onclick="speak('${p[0].replace(/'/g,"\\'")}',this)">🔊</button></div></div>`).join('');}

// ── TABS ─────────────────────────────────────────────
function setTab(t){tab=t;document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['flash','quiz','fill','gender','browse','plan'][i]===t));updDue();if(t==='flash'){buildQ();rFlash();}else if(t==='quiz'){quizSt=null;rQuiz();}else if(t==='fill'){blankSt=null;rFill();}else if(t==='gender'){buildGQ();rGender();}else if(t==='browse')rBrowse();else rPlan();}

// ── FLASH ────────────────────────────────────────────
function buildQ(){let all=aw(),due=all.filter(w=>s2due(w.de)),nd=all.filter(w=>!s2due(w.de));due.sort((a,b)=>{let ca=s2g(a.de),cb=s2g(b.de);if(!ca.next&&!cb.next)return 0;if(!ca.next)return -1;if(!cb.next)return 1;return ca.next.localeCompare(cb.next);});queue=[...due,...nd];qIdx=0;revealed=false;}
function rFlash(){
  let c=document.getElementById('content');
  if(!queue.length){c.innerHTML=statsH()+catH()+'<div class="end-card"><div class="end-emoji">🎉</div><div class="end-title">Queue empty!</div></div>';return;}
  if(qIdx>=queue.length){c.innerHTML=statsH()+catH()+`<div class="end-card"><div class="end-emoji">✅</div><div class="end-title">All done!</div><div class="end-sub">Come back tomorrow for your next cards.</div><button class="btn-next" onclick="buildQ();rFlash()">Review again ↺</button></div>`;return;}
  revealed=false;let item=queue[qIdx],sm=s2g(item.de),isR=(flashMode==='en'),dueC=queue.filter(w=>s2due(w.de)).length;
  let artS=item.art?`<div class="art-s">${item.art}</div>`:'';
  let front=isR?`<div style="text-align:center"><div class="de-word" style="font-size:22px;color:var(--green)">${item.en}</div><div style="font-size:13px;color:var(--txt2);margin-top:4px">German word?</div></div>`:`<div style="text-align:center">${artS}<div class="de-word">${item.de}</div></div><div class="divider"></div>${phDE(item)}`;
  let back=isR?`<div style="text-align:center">${artS}<div class="de-word">${item.de}</div></div><div class="divider"></div>${phFull(item)}`:`<div class="en-word">${item.en}</div><div class="divider"></div>${phFull(item)}`;
  let smI=sm.next?`EF:${sm.ef.toFixed(2)} · ${sm.interval}d interval · next:${sm.next}`:'New card';
  c.innerHTML=statsH()+catH()+
  `<div class="mode-row"><button class="mode-btn${flashMode==='de'?' active':''}" onclick="flashMode='de';buildQ();rFlash()">Flash DE</button><button class="mode-btn${flashMode==='en'?' active':''}" onclick="flashMode='en';buildQ();rFlash()">Flash EN</button></div>
  <div class="info-box">🧠 <b>SM-2:</b> ${dueC} due · card ${qIdx+1}/${queue.length} · ${smI}</div>
  <div class="card"><div class="card-top"><span class="cat-tag">${item.cat}</span><button class="speak-btn" onclick="speak('${item.de.replace(/'/g,"\\'")}',this)">🔊 hören</button></div><div id="fc-f">${front}</div><div id="fc-b" style="display:none">${back}</div><div class="hint-txt" id="fc-h" onclick="revCard()">tap to reveal ↓</div></div>
  <div id="fc-btns" style="display:none"><div class="btn-row"><button class="btn" style="background:var(--rl);color:var(--rd);border-color:#D85A30" onclick="rate(1)">Again</button><button class="btn" style="background:var(--yl);color:var(--yd);border-color:#D4A020" onclick="rate(3)">Hard</button><button class="btn btn-g" onclick="rate(4)">Good</button><button class="btn" style="background:var(--gl);color:var(--gd);font-weight:600;border-color:var(--green)" onclick="rate(5)">Easy</button></div><div class="sm2-note" id="sm2n"></div></div>`;
}
function revCard(){if(revealed)return;revealed=true;document.getElementById('fc-f').style.display='none';document.getElementById('fc-b').style.display='block';document.getElementById('fc-h').style.display='none';document.getElementById('fc-btns').style.display='block';}
function rate(q){let item=queue[qIdx],r=s2r(item.de,q);if(q>=3){known.add(item.de);markStudied();}updDue();updStreak();document.getElementById('sm2n').innerHTML=q===1?`Repeating tomorrow · EF:${r.ef.toFixed(2)}`:`Next review in <b>${r.interval}d</b> · EF:${r.ef.toFixed(2)}`;setTimeout(()=>{qIdx++;rFlash();},800);}

// ── QUIZ ─────────────────────────────────────────────
function rQuiz(){
  let c=document.getElementById('content'),ws=aw();
  if(ws.length<4){c.innerHTML=statsH()+catH()+'<div class="end-card"><div class="end-title">Select more categories</div></div>';return;}
  if(!quizSt)genQ(ws);let q=quizSt;
  let opts=q.opts.map(o=>{let cl=q.ans?(o===q.cor?'correct':(o===q.ch?'wrong':'')):'';return`<button class="q-opt ${cl}" ${q.ans?'disabled':''} onclick="ansQ('${o.replace(/'/g,"\\'")}')"><b>${o}</b></button>`;}).join('');
  let rev=q.ans?phFull(q.item):'';
  c.innerHTML=statsH()+catH()+`<div class="card" style="text-align:center"><div class="card-top"><span class="cat-tag">${q.item.cat}</span><button class="speak-btn" onclick="speak('${q.item.de.replace(/'/g,"\\'")}',this)">🔊</button></div>${q.item.art?`<div class="art-s">${q.item.art}</div>`:''}<div class="de-word">${q.item.de}</div><div style="font-size:13px;color:var(--txt2);margin-top:6px">What does this mean?</div></div><div class="quiz-grid">${opts}</div>${rev}${q.ans?`<button class="btn-next" onclick="nQ()">Next →</button>`:''}`;
}
function genQ(ws){let i=Math.floor(Math.random()*ws.length),item=ws[i];let oth=ws.filter((_,j)=>j!==i);shuf(oth);let opts=[item.en,oth[0].en,oth[1].en,oth[2].en];shuf(opts);quizSt={item,cor:item.en,opts,ans:false,ch:null};}
function ansQ(o){quizSt.ans=true;quizSt.ch=o;if(o===quizSt.cor){known.add(quizSt.item.de);s2r(quizSt.item.de,4);markStudied();}updStreak();rQuiz();}
function nQ(){quizSt=null;rQuiz();}

// ── FILL-IN ──────────────────────────────────────────
function rFill(){
  let c=document.getElementById('content'),ws=aw();
  if(ws.length<4){c.innerHTML=statsH()+catH()+'<div class="end-card"><div class="end-title">Select more categories</div></div>';return;}
  if(!blankSt)genB(ws);let q=blankSt,ph=q.phrase[0];
  let re=new RegExp(q.item.de,'gi');
  let disp=re.test(ph)?ph.replace(re,'<span class="blank"></span>'):ph+'<span class="blank"></span>';
  let opts=q.opts.map(o=>{let cl=q.ans?(o===q.item.de?'correct':(o===q.ch?'wrong':'')):'';return`<button class="q-opt ${cl}" ${q.ans?'disabled':''} onclick="ansB('${o.replace(/'/g,"\\'")}')"><b>${o}</b></button>`;}).join('');
  let rev=q.ans?`<div class="phrase-block" style="margin-top:10px"><div class="phrase-row"><div><div class="phrase-de">${bw(ph,q.item.de)}</div><div class="phrase-en">${q.phrase[1]}</div></div><button class="psb" onclick="speak('${ph.replace(/'/g,"\\'")}',this)">🔊</button></div></div>`:'';
  c.innerHTML=statsH()+catH()+`<div class="card" style="text-align:center"><div class="card-top"><span class="cat-tag">${q.item.cat}</span><button class="speak-btn" onclick="speak('${ph.replace(/'/g,"\\'")}',this)">🔊 hören</button></div><div style="font-size:13px;color:var(--txt2);margin-bottom:12px">Fill in the missing word:</div><div class="blank-phrase">${disp}</div></div><div class="quiz-grid">${opts}</div>${rev}${q.ans?`<button class="btn-next" onclick="nB()">Next →</button>`:''}`;
}
function genB(ws){let cands=ws.filter(w=>w.phrases.some(p=>p[0].includes(w.de)));if(!cands.length)cands=ws;let item=cands[Math.floor(Math.random()*cands.length)];let pw=item.phrases.find(p=>p[0].includes(item.de))||item.phrases[0];let oth=ws.filter(w=>w.de!==item.de);shuf(oth);let opts=[item.de,...oth.slice(0,3).map(w=>w.de)];shuf(opts);blankSt={item,phrase:pw,opts:opts.slice(0,4),ans:false,ch:null};}
function ansB(o){blankSt.ans=true;blankSt.ch=o;if(o===blankSt.item.de){known.add(blankSt.item.de);s2r(blankSt.item.de,4);markStudied();}updStreak();rFill();}
function nB(){blankSt=null;rFill();}

// ── GENDER ───────────────────────────────────────────
function buildGQ(){let ns=aw().filter(w=>w.art!==null);shuf(ns);gQ=ns;gIdx=0;gAns=false;}
function rGender(){
  let c=document.getElementById('content'),ns=aw().filter(w=>w.art!==null);
  if(!ns.length){c.innerHTML=statsH()+'<div class="end-card"><div class="end-title">No nouns in selection</div></div>';return;}
  if(gIdx>=gQ.length){let pct=gScore.tot?Math.round(gScore.ok/gScore.tot*100):0;c.innerHTML=statsH()+catH()+`<div class="end-card"><div class="end-emoji">${pct>=80?'🎉':'💪'}</div><div class="end-title">Round done — ${pct}%</div><div class="end-sub">${gScore.ok}/${gScore.tot} correct</div><button class="btn-next" style="max-width:220px;margin:0 auto;display:block" onclick="gScore={ok:0,tot:0};buildGQ();rGender()">Try again ↺</button></div>`;return;}
  let item=gQ[gIdx];
  let btns=['der','die','das'].map(a=>{let cl=gAns?(a===item.art?'correct':(a!==item.art&&a===window._gc?'wrong':'')):'';return`<button class="g-btn ${cl}" ${gAns?'disabled':''} onclick="ansG('${a}')">${a}</button>`;}).join('');
  let res=gAns?`<div class="gender-result ${window._gc===item.art?'ok':'no'}">${window._gc===item.art?'✓ Richtig!':'✗ '+item.art+' '+item.de}</div>`:'';
  c.innerHTML=`<div class="gender-score"><div class="gscore"><div class="gscore-n" style="color:var(--green)">${gScore.ok}</div><div class="gscore-l">correct</div></div><div class="gscore"><div class="gscore-n" style="color:#D85A30">${gScore.tot-gScore.ok}</div><div class="gscore-l">wrong</div></div><div class="gscore"><div class="gscore-n">${gQ.length-gIdx}</div><div class="gscore-l">left</div></div></div>`+
  catH()+
  `<div class="gender-card"><div class="card-top" style="justify-content:space-between"><span class="cat-tag">${item.cat}</span><button class="speak-btn" onclick="speak('${item.de.replace(/'/g,"\\'")}',this)">🔊 hören</button></div><div class="gender-word">${item.de}</div><div class="gender-hint">der · die · das — which article?</div><div class="gender-btns">${btns}</div>${res}${gAns?`<div style="font-size:13px;color:var(--txt2);margin-top:6px">${item.en}</div><button class="btn-next" style="margin-top:12px" onclick="nG()">Next →</button>`:''}</div>`;
}
function ansG(a){if(gAns)return;gAns=true;window._gc=a;let item=gQ[gIdx];let ok=a===item.art;gScore.tot++;if(ok){gScore.ok++;markStudied();}updStreak();rGender();}
function nG(){gIdx++;gAns=false;rGender();}

// ── BROWSE ───────────────────────────────────────────
function rBrowse(){
  let c=document.getElementById('content'),html=statsH()+catH();
  for(let cat of selCats){
    let ws=DATA[cat]||[],p=cp(cat);
    html+=`<div class="list-sec"><div class="list-cat-hdr">${cat}<span style="font-size:12px;color:var(--txt2);font-weight:400">${p.k}/${p.t}</span></div>`;
    for(let item of ws){
      let k=known.has(item.de),artS=item.art?`<span class="lw-art">${item.art}</span>`:'';
      let phH=item.phrases.map(p=>`<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:7px"><div><div class="lp-de">${bw(p[0],item.de)}</div><div class="lp-en">${p[1]}</div></div><button class="psb" onclick="speak('${p[0].replace(/'/g,"\\'")}',this)" style="margin-left:auto;flex-shrink:0">🔊</button></div>`).join('');
      html+=`<div class="list-word"><div class="list-hdr" onclick="this.nextElementSibling.classList.toggle('open')"><div class="lw-left"><button class="psb" onclick="event.stopPropagation();speak('${item.de.replace(/'/g,"\\'")}',this)">🔊</button>${artS}<span class="lw-de">${item.de}</span><span class="lw-en">— ${item.en}</span></div><div style="display:flex;align-items:center;gap:6px">${k?'<span class="lw-known">✓</span>':''}<span style="color:var(--txt3);font-size:16px">›</span></div></div><div class="list-body">${phH}<button class="mark-btn${k?' known':''}" onclick="toggleKnown('${item.de}',${!k})">${k?'Mark as learning':'Mark as known ✓'}</button></div></div>`;
    }
    html+='</div>';
  }
  c.innerHTML=html;
}
async function toggleKnown(de,val){
  if(val)known.add(de);else known.delete(de);
  let sm=s2g(de);
  await sb.from('word_progress').upsert({user_id:CU.id,word_de:de,known:val,interval:sm.interval,reps:sm.reps,ef:sm.ef,next_review:sm.next,updated_at:new Date().toISOString()},{onConflict:'user_id,word_de'});
  rBrowse();
}

// ── PLAN ─────────────────────────────────────────────
function rPlan(){
  let c=document.getElementById('content');
  let done=doneDays.size,todayDay=Math.max(1,Math.min(11,Math.floor((new Date()-new Date('2026-05-16'))/86400000)+1));
  let html=`<div style="margin-bottom:12px"><div style="font-size:16px;font-weight:600;margin-bottom:10px">11-day plan · May 16–26</div><div class="plan-stats"><div class="stat"><div class="stat-n">50</div><div class="stat-l">words</div></div><div class="stat"><div class="stat-n">40</div><div class="stat-l">min/day</div></div><div class="stat"><div class="stat-n">${done}</div><div class="stat-l">days done</div></div><div class="stat"><div class="stat-n">${streakN}</div><div class="stat-l">🔥 streak</div></div></div><div class="prog-bar"><div class="prog-fill" style="width:${Math.round(done/11*100)}%"></div></div></div>`;
  for(let d of PLAN){
    let isDone=doneDays.has(d.day),isT=d.day===todayDay,isR=d.type==='review'||d.type==='final';
    let dc=isDone?'d':isT?'t':isR?'r':'',badge=isDone?'<span class="badge badge-g">✓ Done</span>':isT?'<span class="badge badge-g">Today</span>':isR?'<span class="badge badge-b">Review</span>':'';
    let sub=d.newWords.length?`${d.newWords.length} new words`:d.type==='review'?'Full review':d.type==='final'?'Final test':'';
    let phH=d.phases.map(p=>`<div class="phase-row"><div class="ph-min">${p.min}m</div><div class="ph-mode">${p.mode}</div><div class="ph-desc">${p.desc}</div></div>`).join('');
    let nwH=d.newWords.length?`<div class="sec-lbl">New words</div><div class="chips">${d.newWords.map(w=>`<span class="chip">${w}</span>`).join('')}</div>`:'';
    let mnH=d.mnemonics.length?`<div class="sec-lbl">Mnemonics</div><div class="sci-box">${d.mnemonics.map(m=>`<div class="mnem-item">${m}</div>`).join('')}</div>`:'';
    html+=`<div class="day-card${isT?' today':''}"><div class="day-hdr" onclick="togDay(${d.day})"><div class="day-num ${dc}">${isDone?'✓':d.day}</div><div class="day-meta"><div class="day-title">${d.date} — ${d.newCat||'Review'}</div><div class="day-sub">${sub}</div></div><div class="day-right">${badge}<div class="day-min">${d.totalMin}m</div><div id="dc${d.day}">›</div></div></div><div class="day-body${isT?' open':''}" id="db${d.day}"><div class="sec-lbl">Session plan</div>${phH}${nwH}${mnH}<div class="sec-lbl">Science note</div><div class="sci-box">${d.science}</div><button class="${isDone?'undone-btn':'done-btn'}" onclick="togDone(${d.day})">${isDone?'Mark as not done':'Mark as done ✓'}</button></div></div>`;
  }
  c.innerHTML=html;
}
function togDay(day){let b=document.getElementById('db'+day),ch=document.getElementById('dc'+day);let o=b.classList.toggle('open');if(ch)ch.textContent=o?'‹':'›';}
function togDone(day){if(doneDays.has(day))doneDays.delete(day);else doneDays.add(day);rPlan();}

speechSynthesis.onvoiceschanged=()=>{};
</script>
