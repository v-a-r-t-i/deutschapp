<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Lernen — A1 Vocabulary</title>
<style>
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ebebea;
  --txt: #1a1a1a; --txt2: #666; --txt3: #999;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
  --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #085041;
  --blue-light: #E6F1FB; --blue-dark: #0C447C;
  --red-light: #FAECE7; --red-dark: #4A1B0C;
  --radius: 10px; --radius-sm: 6px; --radius-pill: 20px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e;
    --txt: #f0f0f0; --txt2: #aaa; --txt3: #666;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --green-light: #0F3D2C; --green-dark: #5DCAA5;
    --blue-light: #0C2340; --blue-dark: #85B7EB;
    --red-light: #3D150A; --red-dark: #F0997B;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
.app{max-width:600px;margin:0 auto;padding:0 0 80px;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
.nav-logo{font-size:16px;font-weight:600;color:var(--txt);}
.nav-right{display:flex;align-items:center;gap:10px;}
.timer-wrap{display:flex;align-items:center;gap:6px;}
.timer-txt{font-size:13px;font-weight:500;color:var(--green);font-variant-numeric:tabular-nums;}
.timer-btn{font-size:12px;padding:3px 8px;border-radius:var(--radius-pill);border:0.5px solid var(--border);background:none;color:var(--txt2);cursor:pointer;}
.day-pill{font-size:12px;padding:3px 10px;border-radius:var(--radius-pill);background:var(--green-light);color:var(--green-dark);font-weight:500;}

/* TABS */
.tabs{display:flex;gap:0;padding:0 16px;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:49px;z-index:9;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:13px;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:var(--green);border-bottom-color:var(--green);font-weight:500;}

/* CONTENT */
.content{padding:16px;}

/* STATS BAR */
.stats-row{display:flex;gap:8px;margin-bottom:16px;}
.stat{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:10px;text-align:center;}
.stat-n{font-size:20px;font-weight:600;color:var(--txt);}
.stat-l{font-size:11px;color:var(--txt2);margin-top:1px;}

/* PROGRESS BAR */
.prog-bar{height:5px;background:var(--bg3);border-radius:3px;margin-bottom:16px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.4s;}

/* CATEGORY BUTTONS */
.cat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.cat-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--radius-pill);border:0.5px solid var(--border);background:var(--bg);color:var(--txt2);font-size:12px;cursor:pointer;transition:all 0.15s;}
.cat-btn.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:500;}
.cat-ring{display:block;flex-shrink:0;}

/* MODE BUTTONS */
.mode-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.mode-btn{flex:1;min-width:55px;padding:8px 4px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--txt2);font-size:12px;cursor:pointer;transition:all 0.15s;text-align:center;}
.mode-btn.active{background:var(--green);color:#fff;border-color:var(--green);}

/* FLASH CARD */
.flashcard{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:20px;margin-bottom:10px;}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cat-tag{font-size:11px;padding:2px 10px;border-radius:var(--radius-pill);background:var(--bg2);color:var(--txt2);}
.speak-btn{display:flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:var(--radius-pill);border:0.5px solid var(--border);background:none;color:var(--txt2);cursor:pointer;}
.speak-btn.speaking{border-color:var(--green);color:var(--green);background:var(--green-light);}
.word-center{text-align:center;margin-bottom:8px;}
.art-small{font-size:13px;color:var(--txt3);font-style:italic;}
.de-word{font-size:32px;font-weight:600;color:var(--txt);}
.en-word{font-size:16px;color:var(--green);font-weight:500;text-align:center;margin-bottom:10px;}
.divider{height:0.5px;background:var(--border);margin:10px 0;}
.phrase-block{margin-bottom:8px;padding:10px 12px;background:var(--bg2);border-radius:var(--radius-sm);}
.phrase-row{display:flex;align-items:flex-start;gap:8px;justify-content:space-between;}
.phrase-de{font-size:14px;font-weight:500;color:var(--txt);flex:1;line-height:1.5;}
.phrase-de .hw{color:var(--green);}
.phrase-en{font-size:12px;color:var(--txt2);margin-top:3px;}
.pspeakbtn{background:none;border:none;font-size:15px;cursor:pointer;color:var(--txt3);padding:2px;flex-shrink:0;}
.hint-txt{text-align:center;font-size:12px;color:var(--txt3);margin-top:10px;cursor:pointer;padding:6px;border-radius:var(--radius-sm);}
.hint-txt:hover{background:var(--bg2);}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn{flex:1;padding:11px;border-radius:var(--radius-sm);border:0.5px solid var(--border);font-size:14px;cursor:pointer;font-weight:500;transition:all 0.15s;background:var(--bg2);color:var(--txt2);}
.btn-green{background:var(--green-light);color:var(--green-dark);border-color:var(--green);}
.btn-green:hover{background:#9FE1CB;}
.btn-next{width:100%;margin-top:10px;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;font-size:14px;font-weight:500;cursor:pointer;}
.btn-next:hover{background:#0F6E56;}
.spaced-note{text-align:center;font-size:11px;color:var(--green-dark);background:var(--green-light);border-radius:var(--radius-pill);padding:4px 12px;margin-top:8px;}

/* QUIZ */
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.quiz-opt{padding:12px 8px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--txt);font-size:13px;cursor:pointer;text-align:center;line-height:1.4;transition:all 0.15s;}
.quiz-opt:hover:not(:disabled){border-color:var(--green);background:var(--green-light);color:var(--green-dark);}
.quiz-opt.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
.quiz-opt.wrong{background:var(--red-light);border-color:#D85A30;color:var(--red-dark);}
.quiz-opt:disabled{cursor:default;}

/* FILL-IN */
.blank-phrase{font-size:18px;font-weight:500;color:var(--txt);text-align:center;line-height:1.8;}
.blank{display:inline-block;background:var(--bg2);border-bottom:2px solid var(--green);min-width:80px;height:24px;vertical-align:middle;border-radius:2px;}

/* BROWSE */
.list-section{margin-bottom:20px;}
.list-cat-hdr{font-size:14px;font-weight:600;color:var(--txt);padding:8px 0 6px;border-bottom:0.5px solid var(--border);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.list-cat-prog{font-size:12px;color:var(--txt2);}
.list-word{margin-bottom:6px;border:0.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.list-word-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;background:var(--bg);}
.list-word-hdr:hover{background:var(--bg2);}
.lw-left{display:flex;align-items:center;gap:7px;min-width:0;}
.lw-art{font-size:11px;color:var(--txt3);font-style:italic;}
.lw-de{font-size:14px;font-weight:500;color:var(--txt);}
.lw-en{font-size:12px;color:var(--txt2);}
.lw-known{font-size:11px;color:var(--green-dark);background:var(--green-light);border-radius:var(--radius-pill);padding:2px 8px;flex-shrink:0;}
.list-word-body{padding:10px 12px;background:var(--bg2);display:none;}
.list-word-body.open{display:block;}
.list-phrase{margin-bottom:8px;display:flex;align-items:flex-start;gap:8px;}
.lp-de{font-size:13px;font-weight:500;color:var(--txt);}
.lp-de .hw{color:var(--green);}
.lp-en{font-size:12px;color:var(--txt2);margin-top:2px;}
.mark-row{margin-top:8px;}
.mark-btn{font-size:12px;padding:4px 12px;border-radius:var(--radius-pill);cursor:pointer;border:0.5px solid var(--border);background:var(--bg);color:var(--txt2);}
.mark-btn.known{background:var(--green-light);color:var(--green-dark);border-color:var(--green);}

/* PLAN TAB */
.plan-hdr{margin-bottom:14px;}
.plan-title{font-size:16px;font-weight:600;color:var(--txt);margin-bottom:10px;}
.plan-stats{display:flex;gap:8px;margin-bottom:12px;}
.plan-stat{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:8px;text-align:center;}
.plan-stat-n{font-size:18px;font-weight:600;color:var(--txt);}
.plan-stat-l{font-size:11px;color:var(--txt2);}
.day-card{border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.day-card.today{border-color:var(--green);border-width:1.5px;}
.day-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:var(--bg);}
.day-hdr:hover{background:var(--bg2);}
.day-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;background:var(--bg2);color:var(--txt2);}
.day-num.today-dot{background:var(--green);color:#fff;}
.day-num.done-dot{background:var(--green-light);color:var(--green-dark);}
.day-num.rev-dot{background:var(--blue-light);color:var(--blue-dark);}
.day-meta{flex:1;min-width:0;}
.day-title{font-size:14px;font-weight:500;color:var(--txt);}
.day-sub{font-size:12px;color:var(--txt2);margin-top:1px;}
.day-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.today-badge{font-size:11px;color:var(--green-dark);background:var(--green-light);padding:2px 8px;border-radius:var(--radius-pill);font-weight:500;}
.done-badge{font-size:11px;color:var(--green-dark);background:var(--green-light);padding:2px 8px;border-radius:var(--radius-pill);}
.rev-badge{font-size:11px;color:var(--blue-dark);background:var(--blue-light);padding:2px 8px;border-radius:var(--radius-pill);}
.day-min{font-size:12px;color:var(--txt2);}
.day-chev{font-size:16px;color:var(--txt3);}
.day-body{padding:12px 14px;background:var(--bg2);border-top:0.5px solid var(--border);display:none;}
.day-body.open{display:block;}
.sec-lbl{font-size:11px;font-weight:500;color:var(--txt3);letter-spacing:0.05em;margin-bottom:6px;margin-top:12px;}
.sec-lbl:first-child{margin-top:0;}
.phase-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.ph-min{font-size:12px;font-weight:500;color:var(--green);width:28px;flex-shrink:0;padding-top:2px;}
.ph-mode{font-size:11px;font-weight:500;color:var(--txt);background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-pill);padding:1px 8px;flex-shrink:0;white-space:nowrap;}
.ph-desc{font-size:12px;color:var(--txt2);flex:1;line-height:1.5;}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.chip{font-size:11px;padding:2px 8px;border-radius:var(--radius-pill);background:var(--bg);border:0.5px solid var(--border);color:var(--txt2);}
.chip.rev{border-color:var(--green);color:var(--green-dark);background:var(--green-light);}
.sci-box{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;margin-top:4px;font-size:12px;color:var(--txt2);line-height:1.55;}
.mnem-item{font-size:12px;color:var(--txt2);padding:4px 0;border-bottom:0.5px solid var(--border);line-height:1.4;}
.mnem-item:last-child{border:none;}
.done-btn{width:100%;margin-top:12px;padding:9px;border-radius:var(--radius-sm);border:0.5px solid var(--green);background:var(--green);color:#fff;font-size:13px;font-weight:500;cursor:pointer;}
.undone-btn{width:100%;margin-top:12px;padding:9px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--txt2);font-size:13px;cursor:pointer;}

/* END CARD */
.end-card{text-align:center;padding:40px 20px;}
.end-emoji{font-size:40px;margin-bottom:10px;}
.end-title{font-size:20px;font-weight:600;color:var(--txt);margin-bottom:8px;}
.end-sub{font-size:14px;color:var(--txt2);margin-bottom:20px;}
</style>
</head>

// ---- STATE ----
let mode = 'flash', flashMode = 'de', tab = 'flash';
let known = new Set(), queue = [], qIdx = 0, revealed = false;
let selectedCats = new Set(Object.keys(DATA));
let quizState = null, blankState = null;
let timerSec = 40*60, timerRunning = false, timerInterval = null;
let completedDays = new Set();

// ---- STORAGE (localStorage for offline) ----
function saveProgress() {
  try {
    localStorage.setItem('de-known', JSON.stringify([...known]));
    localStorage.setItem('de-done', JSON.stringify([...completedDays]));
  } catch(e) {}
}
function loadProgress() {
  try {
    let k = localStorage.getItem('de-known');
    if (k) known = new Set(JSON.parse(k));
    let d = localStorage.getItem('de-done');
    if (d) completedDays = new Set(JSON.parse(d));
  } catch(e) {}
}

// ---- TIMER ----
function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    document.getElementById('timer-btn').textContent = 'Resume';
  } else {
    timerRunning = true;
    document.getElementById('timer-btn').textContent = 'Pause';
    timerInterval = setInterval(() => {
      timerSec--;
      if (timerSec <= 0) { timerSec = 0; clearInterval(timerInterval); timerRunning = false; document.getElementById('timer-btn').textContent = 'Done!'; }
      let m = Math.floor(timerSec/60), s = timerSec%60;
      document.getElementById('timer-txt').textContent = m+':'+(s<10?'0':'')+s;
      document.getElementById('timer-txt').style.color = timerSec < 120 ? '#D85A30' : 'var(--green)';
    }, 1000);
  }
}

// ---- DAY PILL ----
function updateDayPill() {
  let today = new Date();
  let start = new Date('2026-05-16');
  let diff = Math.floor((today - start)/(1000*60*60*24)) + 1;
  let dayNum = Math.max(1, Math.min(11, diff));
  document.getElementById('day-pill').textContent = 'Day ' + dayNum;
}

// ---- SPEAK ----
function speak(text, btn) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  if (btn && btn.classList.contains('speaking')) { btn.classList.remove('speaking'); return; }
  document.querySelectorAll('.speaking').forEach(b=>b.classList.remove('speaking'));
  let u = new SpeechSynthesisUtterance(text); u.lang='de-DE'; u.rate=0.88;
  let voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith('de'));
  if (voices.length) u.voice = voices[0];
  if (btn) { btn.classList.add('speaking'); u.onend=()=>btn.classList.remove('speaking'); }
  speechSynthesis.speak(u);
}

// ---- HELPERS ----
function boldWord(s, w) {
  return s.replace(new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?:en|es|er|em|s|n)?)', 'gi'), '<span class="hw">$1</span>');
}
function allWords() {
  let w=[];
  for (let cat of selectedCats) for (let item of (DATA[cat]||[])) w.push({...item, cat});
  return w;
}
function catProgress(cat) {
  let words=DATA[cat]||[];
  return {known:words.filter(w=>known.has(w.de)).length, total:words.length};
}
function buildQueue() {
  queue = allWords().filter(x=>!known.has(x.de));
  shuffle(queue); qIdx=0;
}
function shuffle(a) { for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }
function miniRing(k,t) {
  let r=7,circ=2*Math.PI*r,pct=t?k/t:0,dash=(pct*circ).toFixed(1),gap=((1-pct)*circ).toFixed(1);
  let col=pct===1?'#1D9E75':pct>0?'#5DCAA5':'rgba(0,0,0,0.15)';
  return `<svg class="cat-ring" width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="${r}" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2"/><circle cx="8" cy="8" r="${r}" fill="none" stroke="${col}" stroke-width="2" stroke-dasharray="${dash} ${gap}" stroke-linecap="round" transform="rotate(-90 8 8)"/></svg>`;
}

// ---- TABS ----
function setTab(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['flash','quiz','fill','browse','plan'][i]===t));
  if (t==='flash') { buildQueue(); renderFlash(); }
  else if (t==='quiz') { quizState=null; renderQuiz(); }
  else if (t==='fill') { blankState=null; renderFill(); }
  else if (t==='browse') renderBrowse();
  else renderPlan();
}

// ---- SHARED CONTROLS ----
function statsHTML() {
  let all=allWords(), total=all.length, k=all.filter(x=>known.has(x.de)).length;
  return `<div class="stats-row">
    <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">words</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${k}</div><div class="stat-l">known</div></div>
    <div class="stat"><div class="stat-n">${total-k}</div><div class="stat-l">to learn</div></div>
  </div>
  <div class="prog-bar"><div class="prog-fill" style="width:${total?Math.round(k/total*100):0}%"></div></div>`;
}
function catGridHTML() {
  return '<div class="cat-grid">'+Object.keys(DATA).map(cat=>{
    let p=catProgress(cat);
    return `<button class="cat-btn${selectedCats.has(cat)?' active':''}" onclick="toggleCat('${cat}')">${miniRing(p.known,p.total)}${cat}</button>`;
  }).join('')+'</div>';
}
function modeRowHTML(modes, active) {
  return '<div class="mode-row">'+modes.map(m=>`<button class="mode-btn${m===active?' active':''}" onclick="setSubMode('${m}')">${m}</button>`).join('')+'</div>';
}
function toggleCat(cat) {
  if (selectedCats.has(cat)){if(selectedCats.size>1)selectedCats.delete(cat);}else selectedCats.add(cat);
  buildQueue(); setTab(tab);
}

// ---- FLASH ----
function setSubMode(m) {
  flashMode = m;
  if (tab==='flash') { buildQueue(); renderFlash(); }
  else if (tab==='quiz') { quizState=null; renderQuiz(); }
  else if (tab==='fill') { blankState=null; renderFill(); }
}

function renderFlash() {
  let c = document.getElementById('content');
  if (!queue.length) { c.innerHTML = statsHTML()+catGridHTML()+'<div class="end-card"><div class="end-emoji">🎉</div><div class="end-title">All words known!</div><div class="end-sub">Switch to Flash EN for extra challenge.</div></div>'; return; }
  if (qIdx>=queue.length) { c.innerHTML = statsHTML()+catGridHTML()+'<div class="end-card"><div class="end-emoji">✅</div><div class="end-title">Queue complete!</div><div class="end-sub">'+queue.length+' words reviewed.</div><button class="btn-next" onclick="buildQueue();renderFlash()">Restart queue ↺</button></div>'; return; }
  revealed=false;
  let item=queue[qIdx], isReverse=(flashMode==='en');
  let artStr=item.art?`<div class="art-small">${item.art}</div>`:'';
  let phrasesDE=item.phrases.map(p=>`<div class="phrase-block"><div class="phrase-row"><div class="phrase-de">${boldWord(p[0],item.de)}</div><button class="pspeakbtn" onclick="speak('${p[0].replace(/'/g,"\\'")}',this)">🔊</button></div></div>`).join('');
  let phrasesFull=item.phrases.map(p=>`<div class="phrase-block"><div class="phrase-row"><div><div class="phrase-de">${boldWord(p[0],item.de)}</div><div class="phrase-en">${p[1]}</div></div><button class="pspeakbtn" onclick="speak('${p[0].replace(/'/g,"\\'")}',this)">🔊</button></div></div>`).join('');
  let front=isReverse?`<div class="word-center"><div class="de-word" style="font-size:22px;color:var(--green)">${item.en}</div></div><div style="text-align:center;font-size:13px;color:var(--txt2);margin-top:4px">What is the German word?</div>`:`<div class="word-center">${artStr}<div class="de-word">${item.de}</div></div><div class="divider"></div>${phrasesDE}`;
  let back=isReverse?`<div class="word-center">${artStr}<div class="de-word">${item.de}</div></div><div class="divider"></div>${phrasesFull}`:`<div class="en-word">${item.en}</div><div class="divider"></div>${phrasesFull}`;
  c.innerHTML=statsHTML()+catGridHTML()+
  modeRowHTML(['Flash DE','Flash EN'],(flashMode==='en'?'Flash EN':'Flash DE'))+
  `<div class="flashcard">
    <div class="card-top">
      <div style="display:flex;align-items:center;gap:6px"><span class="cat-tag">${item.cat}</span><span style="font-size:11px;color:var(--txt3)">${queue.length-qIdx} left</span></div>
      <button class="speak-btn" onclick="speak('${item.de.replace(/'/g,"\\'")}',this)">🔊 hören</button>
    </div>
    <div id="front-c">${front}</div>
    <div id="back-c" style="display:none">${back}</div>
    <div class="hint-txt" id="hint" onclick="revealCard()">tap to reveal ↓</div>
  </div>
  <div id="fc-btns" style="display:none">
    <div class="btn-row">
      <button class="btn" onclick="markSkip()">✗ Still learning</button>
      <button class="btn btn-green" onclick="markKnew()">✓ Got it!</button>
    </div>
    <div id="sp-msg"></div>
  </div>`;
}

function revealCard() {
  if (revealed) return; revealed=true;
  document.getElementById('front-c').style.display='none';
  document.getElementById('back-c').style.display='block';
  document.getElementById('hint').style.display='none';
  document.getElementById('fc-btns').style.display='block';
}
function markKnew() { known.add(queue[qIdx].de); queue.splice(qIdx,1); if(qIdx>=queue.length)qIdx=queue.length; saveProgress(); renderFlash(); }
function markSkip() {
  let item=queue.splice(qIdx,1)[0];
  queue.splice(Math.min(qIdx+3+Math.floor(Math.random()*3),queue.length),0,item);
  renderFlash();
  setTimeout(()=>{ let m=document.getElementById('sp-msg'); if(m)m.innerHTML='<div class="spaced-note">↩ Coming back in a few cards</div>'; },50);
}

// ---- QUIZ ----
function renderQuiz() {
  let c=document.getElementById('content');
  let words=allWords();
  if (words.length<4) { c.innerHTML=statsHTML()+catGridHTML()+'<div class="end-card"><div class="end-title">Select more categories</div></div>'; return; }
  if (!quizState) genQuiz(words);
  let q=quizState;
  let opts=q.options.map(opt=>{
    let cls=q.answered?(opt===q.correct?'correct':(opt===q.chosen?'wrong':'')):'';
    return `<button class="quiz-opt ${cls}" ${q.answered?'disabled':''} onclick="answerQuiz('${opt.replace(/'/g,"\\'")}')"><strong>${opt}</strong></button>`;
  }).join('');
  let phraseReveal=q.answered?q.item.phrases.map(p=>`<div class="phrase-block"><div class="phrase-row"><div><div class="phrase-de">${boldWord(p[0],q.item.de)}</div><div class="phrase-en">${p[1]}</div></div><button class="pspeakbtn" onclick="speak('${p[0].replace(/'/g,"\\'")}',this)">🔊</button></div></div>`).join(''):'';
  c.innerHTML=statsHTML()+catGridHTML()+
  `<div class="flashcard" style="text-align:center">
    <div class="card-top"><span class="cat-tag">${q.item.cat}</span><button class="speak-btn" onclick="speak('${q.item.de.replace(/'/g,"\\'")}',this)">🔊</button></div>
    <div class="word-center">${q.item.art?`<div class="art-small">${q.item.art}</div>`:''}<div class="de-word">${q.item.de}</div></div>
    <div style="font-size:13px;color:var(--txt2);margin-top:6px">What does this mean?</div>
  </div>
  <div class="quiz-grid">${opts}</div>
  ${phraseReveal}
  ${q.answered?`<button class="btn-next" onclick="nextQuiz()">Next →</button>`:''}`;
}
function genQuiz(words) {
  let idx=Math.floor(Math.random()*words.length),item=words[idx];
  let others=words.filter((_,i)=>i!==idx); shuffle(others);
  let opts=[item.en,others[0].en,others[1].en,others[2].en]; shuffle(opts);
  quizState={item,correct:item.en,options:opts,answered:false,chosen:null};
}
function answerQuiz(opt) { quizState.answered=true; quizState.chosen=opt; if(opt===quizState.correct){known.add(quizState.item.de);saveProgress();} renderQuiz(); }
function nextQuiz() { quizState=null; renderQuiz(); }

// ---- FILL-IN ----
function renderFill() {
  let c=document.getElementById('content');
  let words=allWords();
  if (words.length<4) { c.innerHTML=statsHTML()+catGridHTML()+'<div class="end-card"><div class="end-title">Select more categories</div></div>'; return; }
  if (!blankState) genBlank(words);
  let q=blankState, phrase=q.phrase[0];
  let re=new RegExp(q.item.de,'gi');
  let display=re.test(phrase)?phrase.replace(re,'<span class="blank"></span>'):phrase+'<span class="blank"></span>';
  let opts=q.options.map(opt=>{
    let cls=q.answered?(opt===q.item.de?'correct':(opt===q.chosen?'wrong':'')):'';
    return `<button class="quiz-opt ${cls}" ${q.answered?'disabled':''} onclick="answerBlank('${opt.replace(/'/g,"\\'")}')"><strong>${opt}</strong></button>`;
  }).join('');
  let reveal=q.answered?`<div class="phrase-block" style="margin-top:10px"><div class="phrase-row"><div><div class="phrase-de">${boldWord(phrase,q.item.de)}</div><div class="phrase-en">${q.phrase[1]}</div></div><button class="pspeakbtn" onclick="speak('${phrase.replace(/'/g,"\\'")}',this)">🔊</button></div></div>`:'';
  c.innerHTML=statsHTML()+catGridHTML()+
  `<div class="flashcard" style="text-align:center">
    <div class="card-top"><span class="cat-tag">${q.item.cat}</span><button class="speak-btn" onclick="speak('${phrase.replace(/'/g,"\\'")}',this)">🔊 hören</button></div>
    <div style="font-size:13px;color:var(--txt2);margin-bottom:12px">Fill in the missing word:</div>
    <div class="blank-phrase">${display}</div>
  </div>
  <div class="quiz-grid">${opts}</div>
  ${reveal}
  ${q.answered?`<button class="btn-next" onclick="nextBlank()">Next →</button>`:''}`;
}
function genBlank(words) {
  let candidates=words.filter(w=>w.phrases.some(p=>p[0].includes(w.de)));
  if (!candidates.length) candidates=words;
  let item=candidates[Math.floor(Math.random()*candidates.length)];
  let pw=item.phrases.find(p=>p[0].includes(item.de))||item.phrases[0];
  let others=words.filter(w=>w.de!==item.de); shuffle(others);
  let opts=[item.de,...others.slice(0,3).map(w=>w.de)]; shuffle(opts);
  blankState={item,phrase:pw,options:opts.slice(0,4),answered:false,chosen:null};
}
function answerBlank(opt) { blankState.answered=true; blankState.chosen=opt; if(opt===blankState.item.de){known.add(blankState.item.de);saveProgress();} renderFill(); }
function nextBlank() { blankState=null; renderFill(); }

// ---- BROWSE ----
function renderBrowse() {
  let c=document.getElementById('content');
  let html=statsHTML()+catGridHTML();
  for (let cat of selectedCats) {
    let words=DATA[cat]||[], p=catProgress(cat);
    html+=`<div class="list-section"><div class="list-cat-hdr">${cat}<span class="list-cat-prog">${p.known}/${p.total}</span></div>`;
    for (let item of words) {
      let k=known.has(item.de);
      let artStr=item.art?`<span class="lw-art">${item.art}</span>`:'';
      let phHtml=item.phrases.map(p=>`<div class="list-phrase"><div><div class="lp-de">${boldWord(p[0],item.de)}</div><div class="lp-en">${p[1]}</div></div><button class="pspeakbtn" onclick="speak('${p[0].replace(/'/g,"\\'")}',this)" style="flex-shrink:0">🔊</button></div>`).join('');
      html+=`<div class="list-word">
        <div class="list-word-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
          <div class="lw-left"><button class="pspeakbtn" onclick="event.stopPropagation();speak('${item.de.replace(/'/g,"\\'")}',this)">🔊</button>${artStr}<span class="lw-de">${item.de}</span><span class="lw-en">— ${item.en}</span></div>
          ${k?'<span class="lw-known">✓ known</span>':'<span style="color:var(--txt3);font-size:16px">›</span>'}
        </div>
        <div class="list-word-body">
          ${phHtml}
          <div class="mark-row"><button class="mark-btn${k?' known':''}" onclick="setKnown('${item.de}',${!k})">${k?'Mark as learning':'Mark as known ✓'}</button></div>
        </div>
      </div>`;
    }
    html+='</div>';
  }
  c.innerHTML=html;
}
function setKnown(de,val) { if(val)known.add(de);else known.delete(de); saveProgress(); renderBrowse(); }

// ---- PLAN ----
function renderPlan() {
  let c=document.getElementById('content');
  let doneCount=completedDays.size;
  let html=`<div class="plan-hdr">
    <div class="plan-title">11-day study plan — May 16 to 26</div>
    <div class="plan-stats">
      <div class="plan-stat"><div class="plan-stat-n">50</div><div class="plan-stat-l">total words</div></div>
      <div class="plan-stat"><div class="plan-stat-n">40</div><div class="plan-stat-l">min/day</div></div>
      <div class="plan-stat"><div class="plan-stat-n">${doneCount}</div><div class="plan-stat-l">days done</div></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(doneCount/11*100)}%"></div></div>
  </div>`;
  let today=new Date(), start=new Date('2026-05-16');
  let todayDay=Math.floor((today-start)/(1000*60*60*24))+1;
  for (let d of PLAN) {
    let isDone=completedDays.has(d.day);
    let isToday=d.day===todayDay;
    let isRev=d.type==='review'||d.type==='final';
    let dotCls=isDone?'done-dot':isToday?'today-dot':isRev?'rev-dot':'';
    let badge=isDone?'<span class="done-badge">✓ Done</span>':isToday?'<span class="today-badge">Today</span>':isRev?'<span class="rev-badge">Review</span>':'';
    let newCount=d.newWords.length;
    let sub=newCount>0?`${newCount} new word${newCount>1?'s':''}`:d.type==='review'?'Full review — no new words':d.type==='final'?'Final test':'';
    if (d.reviewCats.length>0 && newCount>0) sub += ' · review '+d.reviewCats.join(', ');
    let phasesHtml=d.phases.map(p=>`<div class="phase-row"><div class="ph-min">${p.min}m</div><div class="ph-mode">${p.mode}</div><div class="ph-desc">${p.desc}</div></div>`).join('');
    let newChips=d.newWords.length>0?`<div class="sec-lbl">New words</div><div class="chips">${d.newWords.map(w=>`<span class="chip">${w}</span>`).join('')}</div>`:'';
    let revChips=d.reviewWords.length>0&&d.reviewWords[0]!=='all 50 words'&&d.reviewWords[0]!=='all 22 words so far'?`<div class="sec-lbl">Reviewing</div><div class="chips">${d.reviewWords.map(w=>`<span class="chip rev">${w}</span>`).join('')}</div>`:'';
    let mnHtml=d.mnemonics.length>0?`<div class="sec-lbl">Mnemonics</div><div class="sci-box">${d.mnemonics.map(m=>`<div class="mnem-item">${m}</div>`).join('')}</div>`:'';
    let sciHtml=`<div class="sec-lbl">Science note</div><div class="sci-box">${d.science}</div>`;
    let btnHtml=`<button class="${isDone?'undone-btn':'done-btn'}" onclick="togglePlanDay(${d.day})">${isDone?'Mark as not done':'Mark as done ✓'}</button>`;
    html+=`<div class="day-card${isToday?' today':''}">
      <div class="day-hdr" onclick="toggleDayBody(${d.day})">
        <div class="day-num ${dotCls}">${isDone?'✓':d.day}</div>
        <div class="day-meta"><div class="day-title">${d.date} — ${d.type==='final'?'Final day':d.newCat||'Review'}</div><div class="day-sub">${sub}</div></div>
        <div class="day-right">${badge}<div class="day-min">${d.totalMin}m</div><div class="day-chev" id="chev-${d.day}">›</div></div>
      </div>
      <div class="day-body${isToday?' open':''}" id="dbody-${d.day}">
        <div class="sec-lbl">Session plan</div>${phasesHtml}
        ${newChips}${revChips}${mnHtml}${sciHtml}${btnHtml}
      </div>
    </div>`;
  }
  c.innerHTML=html;
}
function toggleDayBody(day) {
  let b=document.getElementById('dbody-'+day), ch=document.getElementById('chev-'+day);
  let o=b.classList.toggle('open');
  ch.textContent=o?'‹':'›';
}
function togglePlanDay(day) {
  if(completedDays.has(day))completedDays.delete(day);else completedDays.add(day);
  saveProgress(); renderPlan();
}

speechSynthesis.onvoiceschanged=()=>{};
loadProgress();
buildQueue();
updateDayPill();
setTab('flash');
